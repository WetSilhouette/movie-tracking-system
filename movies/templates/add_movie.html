{% extends "base.html" %}
{% block content %}
    <h1>Add Movie</h1>
    <div class="container">
        <!-- Search Form -->
        <form action="{% url 'find_movie' %}" method="get">
            <label class="form-label" for="search_title">Search Movie Title:</label>
            <input type="text" class="form-control" id="search_title" name="title" required>
            <button type="submit" class="btn btn-secondary mt-2">Find Movie</button>
        </form>

        {% if error %}
            <div class="alert alert-danger mt-3">
                {{ error_message }}
            </div>
        {% endif %}

        {% if success %}
            <div class="alert alert-success mt-3">
                Movie added successfully!
            </div>
        {% endif %}

        <hr class="my-4">

        <!-- Add Movie Form -->
        <form action="{% url 'add_movie' %}" method="post">
            {% csrf_token %}

            <label class="form-label" for="title">Title:</label>
            <input type="text" class="form-control" id="title" name="title" value="{{ title }}" required>

            <label class="form-label" for="release_year">Release Year:</label>
            <input type="number" class="form-control" id="release_year" name="release_year" value="{{ release_year }}" required>

            <label class="form-label" for="director">Director:</label>
            <input type="text" class="form-control" id="director" name="director" value="{{ director }}" required>

            <label class="form-label" for="general_rating">General Rating:</label>
            <input type="number" class="form-control" step="0.1" id="general_rating" name="general_rating" value="{{ general_rating }}" required>

            <label class="form-label" for="my_rating">My Rating:</label>
            <input type="number" class="form-control" step="0.1" id="my_rating" name="my_rating" value="{{ my_rating }}" required>

            <label class="form-label" for="total_ratings">Total Ratings:</label>
            <input type="number" class="form-control" id="total_ratings" name="total_ratings" value="{{ total_ratings }}" required>

            <label class="form-label" for="description">Description:</label>
            <textarea class="form-control" id="description" name="description" required>{{ description }}</textarea>

            <label class="form-label" for="keywords">Keywords:</label>
            <input type="text" class="form-control" id="keywords" name="keywords" value="{{ keywords }}" required>

            <label class="form-label" for="tmdb_id">TMDB ID:</label>
            <input type="number" class="form-control" id="tmdb_id" name="tmdb_id" value="{{ tmdb_id }}" required>

            <label class="form-label" for="tmdb_poster_path">TMDB Poster Path:</label>
            <input type="text" class="form-control" id="tmdb_poster_path" name="tmdb_poster_path" value="{{ tmdb_poster_path }}" required>

            {% if tmdb_poster_path %}
                <div class="mt-3">
                    <label class="form-label">Poster Preview:</label><br>
                    <img src="https://image.tmdb.org/t/p/w500{{ tmdb_poster_path }}" alt="{{ title }}" style="max-width: 300px;">
                </div>
            {% endif %}

            <button type="submit" class="btn btn-primary mt-3">Add Movie to Database</button>
        </form>
    </div>
{% endblock %}
