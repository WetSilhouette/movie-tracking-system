{% extends "base.html" %}
{% block content %}
{% with active_page='home' %}
    <h1>Watched Movies</h1>
    <ul>
        {% for movie in movies %}
            <li>{{ movie.title }}</li>
        {% empty %}
            <li>No movies yet.</li>
        {% endfor %}
    </ul>
{% endwith %}
{% endblock %}
